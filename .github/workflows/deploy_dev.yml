name: Deploy to Dev S3

on:
  push:
    branches: [ dev ]  # Triggers on merges/pushes to dev

concurrency:
  group: deploy-dev-root
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: Test Frontend
        working-directory: frontend
        run: npm run test

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Build Artifacts to S3
        env:
          PROTECTED_PREFIXES: ${{ vars.AWS_PROTECTED_PREFIXES }}
        run: |
          protected_prefixes="${PROTECTED_PREFIXES:-apps}"
          IFS=',' read -ra raw_prefixes <<< "$protected_prefixes"
          exclude_args=()

          for raw in "${raw_prefixes[@]}"; do
            prefix="$(echo "$raw" | xargs)"
            if [ -n "$prefix" ]; then
              exclude_args+=(--exclude "${prefix}/*")
            fi
          done

          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_DEV_BUCKET_NAME }}/ --delete "${exclude_args[@]}"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DEV_CLOUDFRONT_ID }} --paths "/*"