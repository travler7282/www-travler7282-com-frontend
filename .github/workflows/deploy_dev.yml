name: Deploy to Dev S3

on:
  push:
    branches: [ dev ]  # Triggers on merges/pushes to dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve sdrx image version
        id: sdrx_version
        run: |
            version=$(node -p "require('./backends/sdrx/package.json').version")
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve roboarm image version
        id: roboarm_version
        run: |
            version=$(python3 - <<'PY'
            import tomllib
            from pathlib import Path

            pyproject = Path("backends/roboarm/pyproject.toml")
            data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
            print(data["project"]["version"])
            PY
            )
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve wxstation image version
        id: wxstation_version
        run: |
            version=$(python3 - <<'PY'
            import tomllib
            from pathlib import Path

            pyproject = Path("backends/wxstation/pyproject.toml")
            data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
            print(data["project"]["version"])
            PY
            )
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and Push SDRx Image (Dev)
        uses: docker/build-push-action@v6
        with:
          context: backends/sdrx
          file: backends/sdrx/Dockerfile
          push: true
          tags: docker.io/travler7282/sdrx:${{ steps.sdrx_version.outputs.version }}-dev

      - name: Build and Push Roboarm Image (Dev)
        uses: docker/build-push-action@v6
        with:
          context: backends/roboarm
          file: backends/roboarm/Dockerfile
          push: true
          tags: |
            docker.io/travler7282/roboarm:${{ steps.roboarm_version.outputs.version }}-dev
            docker.io/travler7282/roboarm:${{ github.sha }}-dev

      - name: Build and Push WXStation Image (Dev)
        uses: docker/build-push-action@v6
        with:
          context: backends/wxstation
          file: backends/wxstation/Dockerfile
          push: true
          tags: |
            docker.io/travler7282/wxstation:${{ steps.wxstation_version.outputs.version }}-dev
            docker.io/travler7282/wxstation:${{ github.sha }}-dev

      - name: Install and Build
        run: |
          rm -f package-lock.json
          npm install --include=optional
          npm ls typescript --workspaces --depth=0
          npm run build:all

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy/roboarm deploy/wxstation deploy/sdrx
          
          # Deploy landing page to the root
          cp -r apps/landing-page/dist/* ./deploy/
          
          # Deploy sub-apps to their respective routes
          cp -r apps/roboarm/dist/* ./deploy/roboarm/
          cp -r apps/wxstation/dist/* ./deploy/wxstation/
          
          # Angular builds to a subfolder within dist
          if [ -d "apps/sdrx/dist/sdrx/browser" ]; then
            cp -r apps/sdrx/dist/sdrx/browser/. ./deploy/sdrx/
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Build Artifacts to S3
        run: aws s3 sync ./deploy s3://${{ secrets.AWS_DEV_BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DEV_CLOUDFRONT_ID }} --paths "/*"