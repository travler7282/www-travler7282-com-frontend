name: Deploy to Prod S3

on:
  push:
    branches: [ main ]  # Triggers on merges/pushes to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve backend image version
        id: backend_version
        run: |
            version=$(node -p "require('./backends/sdr-express-app/package.json').version")
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve roboarm image version
        id: roboarm_version
        run: |
            version=$(python3 - <<'PY'
            import tomllib
            from pathlib import Path

            pyproject = Path("backends/roboarm-fastapi-app/pyproject.toml")
            data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
            print(data["project"]["version"])
            PY
            )
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and Push Backend Image (Prod)
        uses: docker/build-push-action@v6
        with:
          context: backends/sdr-express-app
          file: backends/sdr-express-app/Dockerfile
          push: true
          tags: docker.io/travler7282/sdr-express-app:${{ steps.backend_version.outputs.version }}

      - name: Build and Push Roboarm Image (Prod)
        uses: docker/build-push-action@v6
        with:
          context: backends/roboarm-fastapi-app
          file: backends/roboarm-fastapi-app/Dockerfile
          push: true
          tags: |
            docker.io/travler7282/roboarm-fastapi-app:${{ steps.roboarm_version.outputs.version }}
            docker.io/travler7282/roboarm-fastapi-app:${{ github.sha }}

      - name: Install and Build
        run: |
          rm -f package-lock.json
          npm install --include=optional
          npm ls typescript --workspaces --depth=0
          npm run build:all

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy/react deploy/vue deploy/angular
          
          # Deploy landing page to the root
          cp -r apps/landing-page/dist/* ./deploy/
          
          # Deploy sub-apps to their respective routes
          cp -r apps/react-app/dist/* ./deploy/react/
          cp -r apps/vue-app/dist/* ./deploy/vue/
          
          # Angular 17+ builds to a subfolder within dist
          if [ -d "apps/angular-app/dist/angular-app/browser" ]; then
            cp -r apps/angular-app/dist/angular-app/browser/. ./deploy/angular/
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Build Artifacts to S3
        run: aws s3 sync ./deploy s3://${{ secrets.AWS_PROD_BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_PROD_CLOUDFRONT_ID }} --paths "/*"