<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Framework Showcase | travler7282</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
      h1 { margin-bottom: 2rem; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
      .card { padding: 2rem; border: 1px solid #333; border-radius: 8px; text-align: center; text-decoration: none; color: white; transition: transform 0.2s; background: #242424; }
      .card:hover { transform: translateY(-5px); border-color: #646cff; }
      .react { color: #61dafb; }
      .vue { color: #42b883; }
      .angular { color: #dd0031; }
    </style>
  </head>
  <body>
    <h1>Project Monorepo Showcase</h1>
    <div class="grid">
      <a href="/react/" class="card">
        <h2 class="react">React</h2>
        <p>Vite + TypeScript</p>
      </a>
      <a href="/vue/" class="card">
        <h2 class="vue">Vue</h2>
        <p>Vite + TypeScript</p>
      </a>
      <a href="/angular/" class="card">
        <h2 class="angular">Angular</h2>
        <p>Standalone Components</p>
      </a>
    </div>
  </body>
</html>
