<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sdrGradient" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A2540" />
      <stop offset="1" stop-color="#00A8A8" />
    </linearGradient>
  </defs>

  <!-- Transparent background by default; no backdrop rect is drawn. -->
  <rect x="8" y="8" width="48" height="48" rx="12" fill="url(#sdrGradient)" />

  <!-- Radio mast + signal arcs for SDR visual identity. -->
  <path d="M32 18v18" stroke="#E8FBFF" stroke-width="4" stroke-linecap="round" />
  <circle cx="32" cy="39" r="3" fill="#E8FBFF" />
  <path d="M23 23c5 4 13 4 18 0" stroke="#E8FBFF" stroke-width="3" stroke-linecap="round" />
  <path d="M19 18c8 7 18 7 26 0" stroke="#9EF2F2" stroke-width="3" stroke-linecap="round" opacity="0.95" />

  <!-- SDR monogram for context in larger sizes. -->
  <text x="32" y="52" text-anchor="middle" fill="#FFFFFF" font-size="10" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="0.8">SDR</text>
</svg>
