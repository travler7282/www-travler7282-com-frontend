apiVersion: apps/v1
kind: Deployment
metadata:
  name: roboarm
  labels:
    app: roboarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboarm
  template:
    metadata:
      labels:
        app: roboarm
    spec:
      securityContext:
        # Ensure the pod runs as the non-root user defined in the Dockerfile
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        # Video device group IDs vary across distros/cloud images.
        # Keep a small allowlist of common gids so /dev/video* is readable.
        supplementalGroups:
          - 39
          - 44
          - 986
          - 998
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: roboarm
          image: docker.io/travler7282/roboarm:0.1.0
          securityContext:
            privileged: true
            # Make the contain's own files unchangeable at runtime
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              # NET_RAW is sometimes needed for BLE discovery depending on the kernel version
              add:
                - NET_RAW
          imagePullPolicy: Always
          env:
            - name: ROBOARM_CAMERA_DEVICE
              value: /dev/video0
            - name: ROBOARM_CAMERA_JPEG_QUALITY
              value: "60"
            - name: ROBOARM_CORS_ALLOWED_ORIGINS
              value: https://dev.travler7282.com,https://travler7282.com,https://www.travler7282.com,https://api.travler7282.com,http://localhost:4200,http://localhost:5173,http://localhost:4173
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: dbus-socket
              mountPath: /run/dbus/system_bus_socket
            - name: camera-device
              mountPath: /dev/video0
            - name: tmp-volume
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: dbus-socket
          hostPath:
            path: /run/dbus/system_bus_socket
            type: Socket
        - name: camera-device
          hostPath:
            path: /dev/video0
            type: CharDevice
        - name: tmp-volume
          # Necessary for FastAPI/Uvicorn temp files when root FS is read-only
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: roboarm
spec:
  selector:
    app: roboarm
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roboarm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.travler7282.com
      secretName: roboarm-tls
  rules:
    - host: api.travler7282.com
      http:
        paths:
          - path: /roboarm/api/v1
            pathType: Prefix
            backend:
              service:
                name: roboarm
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: roboarm-tls
spec:
  secretName: roboarm-tls
  dnsNames:
    - api.travler7282.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
