apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-devops-config-prod
data:
  config.yaml: |
    app:
      name: ai-devops-assistant
      max_log_size: 100000

    security:
      require_api_key: true

    rate_limit:
      enabled: true
      requests: 10
      window_seconds: 60

    rag:
      persist_dir: /data/chroma_db
      collection_name: logs

    retention:
      enabled: true
      max_age_seconds: 86400   # 24 hours
      cleanup_interval_seconds: 300  # every 5 minutes
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc-prod
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-assistant-prod
  labels:
    app: devops-assistant-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-assistant-prod
  template:
    metadata:
      labels:
        app: devops-assistant-prod
    spec:
      containers:
        - name: devops-assistant-prod
          image: docker.io/travler7282/devops-assistant:0.1.0
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-devops-secrets-prod
                  key: OPENAI_API_KEY
            - name: APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-devops-secrets-prod
                  key: APP_API_KEY
            - name: APP_CONFIG
              value: /config/config.yaml
          volumeMounts:
            - name: config-prod
              mountPath: /config
            - name: data-prod
              mountPath: /data
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
                path: /devops-assistant/api/v1/readyz
                port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
                path: /devops-assistant/api/v1/healthz
                port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config-prod
          configMap:
            name: ai-devops-config-prod
        - name: data-prod
          persistentVolumeClaim:
            claimName: chroma-pvc-prod
---
apiVersion: v1
kind: Service
metadata:
  name: devops-assistant-prod
spec:
  selector:
    app: devops-assistant-prod
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-assistant-prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.travler7282.com
      secretName: devops-assistant-prod-tls
  rules:
    - host: api.travler7282.com
      http:
        paths:
          - path: /devops-assistant/api/v1
            pathType: Prefix
            backend:
              service:
                name: devops-assistant-prod
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: devops-assistant-prod-tls
spec:
  secretName: devops-assistant-prod-tls
  dnsNames:
    - api.travler7282.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
