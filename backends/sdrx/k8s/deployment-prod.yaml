apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdrx
  labels:
    app: sdrx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdrx
  template:
    metadata:
      labels:
        app: sdrx
    spec:
      containers:
        - name: sdrx
          image: docker.io/travler7282/sdrx:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              value: "*"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sdrx
spec:
  selector:
    app: sdrx
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sdrx
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.travler7282.com
      secretName: sdrx-tls
  rules:
    - host: api.travler7282.com
      http:
        paths:
          - path: /srdx/api/v1
            pathType: Prefix
            backend:
              service:
                name: sdrx
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sdrx-tls
spec:
  secretName: sdrx-tls
  dnsNames:
    - api.travler7282.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
