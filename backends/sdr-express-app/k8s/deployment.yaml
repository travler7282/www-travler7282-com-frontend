apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdr-express-app
  labels:
    app: sdr-express-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sdr-express-app
  template:
    metadata:
      labels:
        app: sdr-express-app
    spec:
      containers:
        - name: sdr-express-app
          image: ghcr.io/your-org/sdr-express-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              value: "*"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sdr-express-app
spec:
  selector:
    app: sdr-express-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
