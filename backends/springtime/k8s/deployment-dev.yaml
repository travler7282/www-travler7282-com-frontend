apiVersion: apps/v1
kind: Deployment
metadata:
  name: springtime-dev
  labels:
    app: springtime-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springtime-dev
  template:
    metadata:
      labels:
        app: springtime-dev
    spec:
      containers:
        - name: springtime
          image: docker.io/travler7282/springtime:0.0.1-SNAPSHOT-dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: springtime-dev
spec:
  selector:
    app: springtime-dev
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springtime-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dev-api.travler7282.com
      secretName: springtime-dev-tls
  rules:
    - host: dev-api.travler7282.com
      http:
        paths:
          - path: /springtime/api/v1
            pathType: Prefix
            backend:
              service:
                name: springtime-dev
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: springtime-dev-tls
spec:
  secretName: springtime-dev-tls
  dnsNames:
    - dev-api.travler7282.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
